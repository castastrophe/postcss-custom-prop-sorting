name: Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Linting check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 24

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check formatting
        run: yarn lint-staged

      - name: Validate typing
        run: |
          yarn types
          if ! git diff --exit-code -- index.d.ts; then
            echo "::error::index.d.ts is stale — run 'yarn types' and commit the result."
            exit 1
          fi

  test:
    # Full test suite. Ava 8 requires Node ^22.20 || ^24.12 || >=26, so we
    # can only run `yarn test` on those. See the `smoke` job below for
    # validation on Node 18/20.
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run test suite
        run: yarn test

  smoke:
    # engines.node claims >=18 for consumers. Prove it: on Node 18/20 (where
    # our dev tooling can't install), just verify the module loads and the
    # plugin runs end-to-end against a small input via a bare `postcss` install.
    name: Smoke (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install postcss only
        # Deliberately not running `yarn install` — its dev-tooling floor is
        # higher than the plugin's runtime floor. Install just the runtime dep.
        run: npm install --no-save --no-package-lock postcss@^8.4.0

      - name: Import and run plugin
        run: |
          node --input-type=module -e '
            import postcss from "postcss";
            import plugin from "./index.js";
            const input = ".a { --z: 1; --a: var(--z); color: red; }";
            const result = await postcss([plugin()]).process(input, { from: "smoke.css" });
            const warnings = result.warnings();
            if (warnings.length !== 0) { console.error("unexpected warnings:", warnings); process.exit(1); }
            if (!result.css.includes("--z: 1;")) { console.error("output missing --z:", result.css); process.exit(1); }
            if (!result.css.includes("--a: var(--z);")) { console.error("output missing --a:", result.css); process.exit(1); }
            console.log("smoke ok on node", process.version);
          '

  coverage:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 22

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run coverage report
        run: yarn coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-data-${{ github.run_id }}
          path: |
            coverage/**/*.json
      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/cobertura-coverage.xml
          format: "markdown"
          output: "both"
      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          recreate: true
          path: code-coverage-results.md
      - name: Write to job summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
