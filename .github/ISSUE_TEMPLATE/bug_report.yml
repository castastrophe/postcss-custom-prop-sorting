name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please search existing issues for this project to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact steps needed to trigger the bug.
      placeholder: |
        1. Run `<command>` in a directory that contains...
        2. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include any error output.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in the relevant details.
      value: |
        - Affected project version:
        - Node.js version:
        - Package manager + version:
        - OS:
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues, workarounds you've tried.
    validations:
      required: false
